<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINE Confirm Old Style</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 1080px;
        height: 2400px;
        margin: 0;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #e8fff3 0%, #eaf5ff 55%, #f7fbff 100%);
      }

      body {
        display: grid;
        place-items: center;
        padding: 70px 46px;
        color: #132033;
      }

      .card {
        width: 940px;
        overflow: hidden;
        border-radius: 76px;
        background: #fff;
        box-shadow: 0 56px 145px rgba(30, 76, 120, .18);
      }

      .header {
        display: grid;
        grid-template-columns: 110px 1fr 110px;
        align-items: center;
        min-height: 158px;
        padding: 0 36px;
        border-bottom: 1px solid #e5edf5;
        background: #fff;
      }

      .back {
        display: grid;
        width: 92px;
        height: 92px;
        place-items: center;
        border-radius: 50%;
        color: #06c755;
        background: #ecfff4;
        font-size: 76px;
        line-height: 1;
        font-weight: 800;
      }

      .header strong {
        color: #132033;
        font-size: 48px;
        font-weight: 950;
        text-align: center;
      }

      .content {
        padding: 62px 58px 70px;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 34px;
        margin: 8px 0 54px;
      }

      .line-logo,
      .brand-mark {
        display: grid;
        width: 168px;
        height: 168px;
        place-items: center;
        border-radius: 50px;
        color: #fff;
        font-size: 40px;
        font-weight: 950;
      }

      .line-logo {
        background: #06c755;
        box-shadow: 0 28px 58px rgba(6, 199, 85, .22);
      }

      .bridge {
        color: #9aa8ba;
        font-size: 66px;
        font-weight: 950;
      }

      .brand-mark {
        position: relative;
        background: linear-gradient(145deg, #2db7ff 0%, #0572ff 100%);
        box-shadow: 0 28px 58px rgba(0, 105, 220, .22);
      }

      .heart {
        position: relative;
        width: 78px;
        height: 70px;
        transform: rotate(-45deg);
        background: #fff;
        border-radius: 16px;
      }

      .heart::before,
      .heart::after {
        position: absolute;
        content: "";
        width: 78px;
        height: 78px;
        border-radius: 50%;
        background: #fff;
      }

      .heart::before { top: -39px; left: 0; }
      .heart::after { top: 0; left: 39px; }

      .plus {
        position: absolute;
        right: 28px;
        bottom: 28px;
        color: #fff;
        font-size: 58px;
        line-height: 1;
        font-weight: 950;
      }

      h1 {
        margin: 0 0 34px;
        color: #101828;
        font-size: 64px;
        font-weight: 950;
        line-height: 1.2;
        text-align: center;
      }

      p {
        margin: 0 0 44px;
        color: #667085;
        font-size: 40px;
        font-weight: 750;
        line-height: 1.55;
        text-align: center;
      }

      ul {
        display: grid;
        gap: 24px;
        margin: 0 0 54px;
        padding: 36px;
        border-radius: 48px;
        background: #f4fbf7;
        list-style: none;
      }

      li {
        display: grid;
        grid-template-columns: 64px 1fr;
        align-items: center;
        gap: 22px;
        color: #344054;
        font-size: 38px;
        font-weight: 850;
        line-height: 1.35;
      }

      li span {
        display: grid;
        width: 58px;
        height: 58px;
        place-items: center;
        border-radius: 50%;
        color: #fff;
        background: #06c755;
        font-size: 34px;
        font-weight: 950;
      }

      button {
        width: 100%;
        min-height: 136px;
        border-radius: 42px;
        font-family: inherit;
        font-size: 46px;
        font-weight: 950;
      }

      .approve {
        border: 0;
        color: #fff;
        background: #06c755;
        box-shadow: 0 28px 58px rgba(6, 199, 85, .22);
      }

      .cancel {
        margin-top: 28px;
        border: 4px solid #dbeafe;
        color: #075adf;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <header class="header">
        <div class="back">‹</div>
        <strong>LINE Login</strong>
        <div></div>
      </header>
      <main class="content">
        <div class="brand">
          <div class="line-logo">LINE</div>
          <div class="bridge">→</div>
          <div class="brand-mark"><div class="heart"></div><div class="plus">+</div></div>
        </div>
        <h1>อนุญาตให้ MyBuddy+ เข้าสู่ระบบด้วย LINE</h1>
        <p>MyBuddy+ จะใช้ข้อมูลพื้นฐานจากบัญชี LINE เพื่อเข้าสู่ระบบและดูแลประสบการณ์ของคุณให้ต่อเนื่อง</p>
        <ul>
          <li><span>✓</span>ชื่อโปรไฟล์และรูปโปรไฟล์</li>
          <li><span>✓</span>ใช้สำหรับยืนยันตัวตนในแอป</li>
          <li><span>✓</span>ไม่โพสต์ข้อความแทนคุณ</li>
        </ul>
        <button class="approve">อนุญาตและเข้าสู่ระบบ</button>
        <button class="cancel">ยกเลิก</button>
      </main>
    </section>
  </body>
</html>
